<nav class="flex items-center gap-2 overflow-x-auto text-sm text-lumina-text-muted"
     style="scrollbar-width:none"
     aria-label="Breadcrumb">
    <a href="{{ pathto(root_doc) }}"
       class="whitespace-nowrap hover:text-lumina-accent no-underline transition-colors">{{ shorttitle }}</a>
    {% if parents %}
        {% for parent in parents %}
            {{ lumina_icon("chevron-right", size=14, css_class="flex-shrink-0") }}
            <a href="{{ parent.link }}"
               class="whitespace-nowrap hover:text-lumina-accent no-underline transition-colors">{{ parent.title }}</a>
        {% endfor %}
    {% endif %}
    {{ lumina_icon("chevron-right", size=14, css_class="flex-shrink-0") }}
    <span class="whitespace-nowrap text-lumina-text">{{ title }}</span>
</nav>
