<div id="lumina-shortcuts-modal"
     x-data="shortcutsModal()"
     x-show="open"
     x-cloak
     @keydown.escape.window="close()"
     class="fixed inset-0 z-[100]"
     role="dialog"
     aria-modal="true"
     aria-labelledby="lumina-shortcuts-title">
    {# Backdrop #}
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="close()"></div>
    {# Modal #}
    <div x-ref="dialog"
         tabindex="-1"
         class="relative mx-auto mt-[15vh] max-w-md rounded-xl border border-[var(--lumina-border)] bg-[var(--lumina-bg)] shadow-2xl outline-none"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95">
        {# Header #}
        <div class="flex items-center justify-between border-b border-[var(--lumina-border)] px-4 py-3">
            <h2 id="lumina-shortcuts-title"
                class="m-0 text-sm font-semibold text-[var(--lumina-text)]">Keyboard shortcuts</h2>
            <button @click="close()"
                    class="rounded-md p-1 text-[var(--lumina-text-muted)] hover:text-[var(--lumina-text)] hover:bg-[var(--lumina-bg-secondary)] transition-colors cursor-pointer"
                    aria-label="Close shortcuts dialog"
                    type="button">{{ lumina_icon("x", size=16) }}</button>
        </div>
        {# Shortcut groups #}
        <div class="max-h-[60vh] overflow-y-auto px-4 py-3">
            <section class="mb-4">
                <h3 class="mb-2 text-[0.6875rem] font-semibold uppercase tracking-wide text-[var(--lumina-text-muted)]">Search</h3>
                <ul class="m-0 list-none space-y-1.5 p-0">
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Open search</span>
                        <span class="flex items-center gap-1">
                            <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]"
                                 x-text="modKey"></kbd>
                            <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">K</kbd>
                        </span>
                    </li>
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Open search (alias)</span>
                        <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">/</kbd>
                    </li>
                </ul>
            </section>
            <section class="mb-4">
                <h3 class="mb-2 text-[0.6875rem] font-semibold uppercase tracking-wide text-[var(--lumina-text-muted)]">Navigation</h3>
                <ul class="m-0 list-none space-y-1.5 p-0">
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Move selection</span>
                        <span class="flex items-center gap-1">
                            <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">&uarr;</kbd>
                            <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">&darr;</kbd>
                        </span>
                    </li>
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Open selected result</span>
                        <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">&crarr;</kbd>
                    </li>
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Close any dialog</span>
                        <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">Esc</kbd>
                    </li>
                </ul>
            </section>
            <section>
                <h3 class="mb-2 text-[0.6875rem] font-semibold uppercase tracking-wide text-[var(--lumina-text-muted)]">Page</h3>
                <ul class="m-0 list-none space-y-1.5 p-0">
                    <li class="flex items-center justify-between gap-4">
                        <span class="text-sm text-[var(--lumina-text)]">Show this dialog</span>
                        <kbd class="rounded border border-[var(--lumina-border)] bg-[var(--lumina-bg-secondary)] px-1.5 py-0.5 font-mono text-[10px] text-[var(--lumina-text-muted)]">?</kbd>
                    </li>
                </ul>
            </section>
        </div>
    </div>
</div>
