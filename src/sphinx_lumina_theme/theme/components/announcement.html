{% if announcement_content is defined and announcement_content %}
    <div id="lumina-announcement"
         x-data="announcementBanner()"
         data-announcement-id="{{ announcement_id }}"
         role="region"
         aria-label="Site announcement"
         class="lumina-announcement{% if announcement_variant %} lumina-announcement-{{ announcement_variant }}{% endif %} text-center text-sm">
        <div class="mx-auto flex max-w-[90rem] items-center justify-center gap-4 px-4 py-2">
            <div class="flex-1 [&_a]:underline [&_a]:font-medium">{{ announcement_content }}</div>
            {% if announcement_link and announcement_link_label %}
                <a href="{{ announcement_link }}"
                   class="lumina-announcement-cta shrink-0 rounded px-2 py-0.5 text-xs font-semibold uppercase tracking-wide no-underline transition-colors">{{ announcement_link_label }}</a>
            {% endif %}
            <button @click="dismiss()"
                    class="shrink-0 rounded p-0.5 opacity-80 hover:opacity-100 hover:bg-white/10 transition-colors cursor-pointer"
                    aria-label="Dismiss announcement"
                    type="button">{{ lumina_icon("x", size=16) }}</button>
        </div>
    </div>
{% endif %}
