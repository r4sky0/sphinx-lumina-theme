name: Bug report
description: Report something that does not behave as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, what you expected, and what occurred instead.
      placeholder: When I do X, Y happens, but I expected Z.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal `conf.py` + source snippet, or a link to a minimal repo.
      render: markdown
      placeholder: |
        1. `pip install sphinx-lumina-theme==…`
        2. `conf.py`: `html_theme = "lumina"` plus the relevant options
        3. Build: `sphinx-build docs docs/_build/html`
        4. Open `docs/_build/html/…`
    validations:
      required: true
  - type: input
    id: theme-version
    attributes:
      label: Lumina version
      placeholder: e.g. 1.33.2
    validations:
      required: true
  - type: input
    id: sphinx-version
    attributes:
      label: Sphinx version
      placeholder: e.g. 8.1.3
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: e.g. 3.13.1
  - type: input
    id: browser
    attributes:
      label: Browser (if visual / JS bug)
      placeholder: e.g. Firefox 122 on macOS
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag images here, or paste any relevant build output or browser console errors.
